# ========================================
# General Settings
# ========================================

# Change prefix from C-b to C-s
unbind C-b
set -g prefix C-s
bind-key -r C-s send-prefix

# Reload config file
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# Enable mouse support (great for mobile/touch screens!)
set -g mouse on

# Increase scrollback buffer size
set -g history-limit 50000

# Start window and pane indices at 1
set-option -g base-index 1
set-option -g renumber-windows on
setw -g pane-base-index 1

# Reduce escape time for better vim/editor experience
set -s escape-time 0

# Enable focus events for vim/editor integration
set -g focus-events on

# Aggressive resize - useful when accessing from multiple devices
setw -g aggressive-resize on

# Enable true color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Display messages for longer
set -g display-time 2000
set -g display-panes-time 3000

# ========================================
# Vim Integration & Pane Navigation
# ========================================

is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?)(diff)?$"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n 'C-\' if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

bind C-l send-keys C-l
bind C-k send-keys C-k

# ========================================
# Status Bar Configuration
# ========================================

set-option -g status-left-length 50
set-option -g status-right-length 150

# Status right: weather, date/time
set-option -g status-right "#[fg=colour136]#(~/.dotfiles/bin/tmux-weather) #[fg=colour244]| #[fg=colour136]%a %b %d #[fg=colour166]%I:%M %p"

# Update status bar every 15 seconds (default is 15, weather caches for 15 min)
set-option -g status-interval 15

# ========================================
# Window & Pane Management
# ========================================

# Split windows with - and \ (maintaining current path)
bind-key - split-window -v  -c '#{pane_current_path}'
bind-key '\' split-window -h  -c '#{pane_current_path}'

# Resize panes with Shift + Arrow keys (fine control)
bind -n S-Left resize-pane -L 2
bind -n S-Right resize-pane -R 2
bind -n S-Down resize-pane -D 1
bind -n S-Up resize-pane -U 1

# Resize panes with Ctrl + Arrow keys (coarse control)
bind -n C-Left resize-pane -L 10
bind -n C-Right resize-pane -R 10
bind -n C-Down resize-pane -D 5
bind -n C-Up resize-pane -U 5

# New window in current path
bind c new-window -c '#{pane_current_path}'

# Break pane into new window
bind-key b break-pane -d

# Prompted join-pane
bind-key j command-prompt -p "join pane from: "  "join-pane -h -s '%%'"

# Close window with confirmation
bind-key X confirm-before -p "kill-window #W? (y/n)" kill-window

# Swap panes easily
bind-key s display-panes\; command-prompt -p "pane #: "  "swap-pane -t '%%'"

# ========================================
# Session Management
# ========================================

# Interactive session switcher (requires fzf)
bind-key C-j split-window -v "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

# Session manager with tm script (replaces old tat)
bind-key J split-window -v "tm"

# Switch to last session
bind-key C-^ switch-client -l

# ========================================
# Copy Mode (Vim-style)
# ========================================

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Setup 'v' to begin selection as in Vim
unbind-key -T copy-mode-vi v
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi 'C-v' send-keys -X begin-selection\; send-keys -X rectangle-toggle

# Copy to system clipboard (modern tmux has native clipboard support)
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Also use ] to switch into copy mode (we don't need it to paste stuff)
bind-key ] copy-mode

# ========================================
# Popup Windows (Tmux 3.2+)
# ========================================

# Popup with git status
bind-key g display-popup -E -w 80% -h 80% "git status && echo '\n--- Recent commits ---' && git log --oneline -10"

# Popup with cheat sheet
bind-key ? display-popup -E -w 90% -h 90% "cat ~/.dotfiles/support/tmux-cheatsheet.md | less"

# Popup scratch terminal
bind-key ! display-popup -E -w 80% -h 80%

# Popup with detailed weather forecast
bind-key w display-popup -E -w 90% -h 90% "~/.dotfiles/bin/tmux-weather-detailed"

# ========================================
# Useful Shortcuts
# ========================================

# Quick htop in split
bind-key h split-window -h "htop"

# Breakout pane into new session
bind-key C-b send-keys 'tm && exit' 'C-m'

# Scratch pad in vim
bind C-p if-shell "$is_vim" "send-keys Escape; send-keys ':vsp .scratch'; send-keys Enter" "split-window -h 'vim .scratch'"


#### COLOUR (Solarized 256)

# default statusbar colors
set-option -g status-style fg=colour136,bg=colour235 #yellow and base02

# default window title colors
set-window-option -g window-status-style fg=colour244,bg=default #base0 and default
#set-window-option -g window-status-style dim

# active window title colors
set-window-option -g window-status-current-style fg=colour166,bg=default #orange and default
#set-window-option -g window-status-current-style bright

# pane border
set-option -g pane-border-style fg=colour235 #base02
set-option -g pane-active-border-style fg=colour240 #base01

# message text
set-option -g message-style fg=colour166,bg=colour235 #orange and base02

# pane number display
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour166 #orange

# clock
set-window-option -g clock-mode-colour colour64 #green

# bell
set-window-option -g window-status-bell-style fg=colour235,bg=colour160 #base02, red

# ========================================
# TPM - Tmux Plugin Manager
# ========================================
# Plugins will be installed to ~/.tmux/plugins/

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'

# tmux-continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-resurrect settings
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

